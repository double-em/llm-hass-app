{% extends "layout.html" %}

{% block title %}Persons - LLM AI{% endblock %}

{% block content %}
<div class="persons-page">
    <h1>Person Management</h1>

    <div class="section">
        <h2>Enroll New Person</h2>
        <form id="person-form" onsubmit="createPerson(event)">
            <div class="form-group">
                <label>Person Name</label>
                <input type="text" id="person-name" placeholder="Enter person's name" required>
            </div>
            <div class="form-group">
                <label>Voice Samples (WAV)</label>
                <p class="info">Upload 3-5 voice samples for best enrollment.</p>
                <input type="file" id="person-samples" accept=".wav" multiple required>
            </div>
            <button type="submit" class="btn-primary">Enroll Person</button>
        </form>
    </div>

    <div class="section">
        <h2>Enrolled Persons</h2>
        <div id="persons-list" class="persons-list">
            Loading...
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadPersons() {
    try {
        const response = await fetch('/api/persons');
        const data = await response.json();
        const container = document.getElementById('persons-list');
        const persons = data.persons || [];

        if (persons.length === 0) {
            container.innerHTML = '';
            const empty = document.createElement('p');
            empty.className = 'empty';
            empty.textContent = 'No persons enrolled yet.';
            container.appendChild(empty);
            return;
        }

        container.innerHTML = '';
        persons.forEach(person => {
            const card = document.createElement('div');
            card.className = 'person-card';

            const header = document.createElement('div');
            header.className = 'person-header';

            const title = document.createElement('h3');
            title.textContent = person.name;
            header.appendChild(title);

            const badge = document.createElement('span');
            badge.className = person.enrollment_complete ? 'badge badge-success' : 'badge badge-pending';
            badge.textContent = person.enrollment_complete ? 'Enrolled' : 'Pending';
            header.appendChild(badge);

            card.appendChild(header);

            const info = document.createElement('div');
            info.className = 'person-info';

            const sampleCount = document.createElement('p');
            sampleCount.textContent = 'Voice samples: ' + (person.voice_samples ? person.voice_samples.length : 0);
            info.appendChild(sampleCount);

            card.appendChild(info);

            const actions = document.createElement('div');
            actions.className = 'person-actions';

            const verifyBtn = document.createElement('button');
            verifyBtn.className = 'btn-secondary';
            verifyBtn.textContent = 'Verify';
            verifyBtn.onclick = () => verifySpeaker(person.id);
            actions.appendChild(verifyBtn);

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-danger';
            deleteBtn.textContent = 'Delete';
            deleteBtn.onclick = () => deletePerson(person.id);
            actions.appendChild(deleteBtn);

            card.appendChild(actions);
            container.appendChild(card);
        });
    } catch (e) {
        document.getElementById('persons-list').textContent = 'Error loading persons.';
    }
}

async function createPerson(e) {
    e.preventDefault();
    const name = document.getElementById('person-name').value;
    const files = document.getElementById('person-samples').files;

    const formData = new FormData();
    formData.append('name', name);
    for (let i = 0; i < files.length; i++) {
        formData.append('samples', files[i]);
    }

    const response = await fetch('/api/persons', { method: 'POST', body: formData });
    if (response.ok) {
        document.getElementById('person-form').reset();
        loadPersons();
    } else {
        const err = await response.json();
        alert('Error: ' + (err.error || 'Failed'));
    }
}

async function verifySpeaker(personId) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.wav';
    input.onchange = async () => {
        if (!input.files[0]) return;
        const formData = new FormData();
        formData.append('audio', input.files[0]);
        const response = await fetch('/api/verify-speaker/' + personId, { method: 'POST', body: formData });
        const result = await response.json();
        alert(response.ok ? 'Match: ' + result.verified + ', Confidence: ' + (result.confidence * 100).toFixed(1) + '%' : 'Error');
    };
    input.click();
}

async function deletePerson(personId) {
    if (!confirm('Delete this person?')) return;
    const response = await fetch('/api/persons/' + personId, { method: 'DELETE' });
    if (response.ok) loadPersons();
}

loadPersons();
</script>
{% endblock %}

name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest

      - name: Create llm_app package for tests
        run: |
          mkdir -p llm_app
          touch llm_app/__init__.py
          ln -s ../voice_cache.py llm_app/voice_cache.py
          ln -s ../voice_cache_store.py llm_app/voice_cache_store.py
          ln -s ../voice_presets.py llm_app/voice_presets.py
          ln -s ../voice_engine.py llm_app/voice_engine.py
          ln -s ../omnivoice_client.py llm_app/omnivoice_client.py
          ln -s ../person.py llm_app/person.py
          ln -s ../person_store.py llm_app/person_store.py
          ln -s ../enrollment.py llm_app/enrollment.py
          ln -s ../voiceprint.py llm_app/voiceprint.py
          ln -s ../app.py llm_app/app.py
          ln -s ../config_flow.py llm_app/config_flow.py
          ln -s ../const.py llm_app/const.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cpu
          push: true
          tags: |
            ghcr.io/double-em/llm-hass-app:latest
            ghcr.io/double-em/llm-hass-app:cpu-${{ steps.version.outputs.VERSION }}
            ghcr.io/double-em/llm-hass-app:cpu-latest
            ghcr.io/double-em/llm-hass-app-amd64:${{ steps.version.outputs.VERSION }}
            ghcr.io/double-em/llm-hass-app-amd64:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.gpu
          push: true
          tags: |
            ghcr.io/double-em/llm-hass-app:gpu-${{ steps.version.outputs.VERSION }}
            ghcr.io/double-em/llm-hass-app:gpu-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
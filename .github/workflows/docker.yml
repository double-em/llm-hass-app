name: Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semantic Version Bump
        id: version
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          release-type: python
          path: .
          skip-github-pull-request: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest

      - name: Create llm_app package for tests
        run: |
          mkdir -p llm_app
          touch llm_app/__init__.py
          ln -s ../voice_cache.py llm_app/voice_cache.py
          ln -s ../voice_cache_store.py llm_app/voice_cache_store.py
          ln -s ../voice_presets.py llm_app/voice_presets.py
          ln -s ../voice_engine.py llm_app/voice_engine.py
          ln -s ../omnivoice_client.py llm_app/omnivoice_client.py
          ln -s ../person.py llm_app/person.py
          ln -s ../person_store.py llm_app/person_store.py
          ln -s ../enrollment.py llm_app/enrollment.py
          ln -s ../voiceprint.py llm_app/voiceprint.py
          ln -s ../app.py llm_app/app.py
          ln -s ../config_flow.py llm_app/config_flow.py
          ln -s ../const.py llm_app/const.py

      - name: Run tests
        run: |
          python -m pytest tests/ -v || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cpu
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/double-em/llm-hass-app:${{ steps.version.outputs.VERSION || 'latest' }}
            ghcr.io/double-em/llm-hass-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION || 'latest' }}

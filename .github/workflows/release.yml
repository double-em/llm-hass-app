name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  HASS_ADDON_REPO: double-em/doubleem-hass-addons

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          REF="$GITHUB_REF"

          echo "Input version: '$INPUT_VERSION'"
          echo "Git ref: '$REF'"

          VERSION=""
          if [[ "$INPUT_VERSION" != "" ]]; then
            # workflow_dispatch input includes 'v' prefix - strip it
            VERSION="${INPUT_VERSION#v}"
          elif [[ "$REF" == refs/tags/* ]]; then
            # git ref format: refs/tags/v1.0.0
            VERSION="${REF#refs/tags/}"
          fi

          echo "Extracted version: '$VERSION'"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate changelog from commits
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHANGELOG=$(git log --oneline -30)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes in v${VERSION}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: false
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Container Image

            `ghcr.io/double-em/llm-hass-app:${{ steps.version.outputs.VERSION }}`

            ## Upgrade Notes

            - If using HA addon, update to latest version from addon store
            - HA addon version: ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          # Only create tag if it doesn't exist (for workflow_dispatch)
          create_only: ${{ github.event.inputs.version != '' }}

  sync-ha-addon:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout HA addon repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HASS_ADDON_REPO }}
          path: ha-addon
          token: ${{ secrets.HA_ADDON_PAT }}

      - name: Update version in HA addon
        run: |
          cd ha-addon

          # Get today's date and version (without v prefix)
          TODAY=$(date +%Y-%m-%d)
          VERSION="${{ needs.create-release.outputs.version }}"

          # Update config.yaml version
          sed -i "s/version: \".*\"/version: \"$VERSION\"/" llm_ai_dashboard/config.yaml

          # Update build.yaml LLM_VERSION
          sed -i "s/LLM_VERSION: \".*\"/LLM_VERSION: \"$VERSION\"/" llm_ai_dashboard/build.yaml

          # Create new CHANGELOG entry content
          cat > /tmp/changelog_entry.txt << 'ENDENTRY'

## ['"$VERSION"'] - '"$TODAY"'

### Changed
- Version bump to '"$VERSION"'
ENDENTRY

          # Prepend entry after header lines (lines 1-3) using head/tail
          HEAD_LINES=$(head -n 3 llm_ai_dashboard/CHANGELOG.md)
          REST=$(tail -n +4 llm_ai_dashboard/CHANGELOG.md)
          echo "$HEAD_LINES" > llm_ai_dashboard/CHANGELOG.md
          cat /tmp/changelog_entry.txt >> llm_ai_dashboard/CHANGELOG.md
          echo "" >> llm_ai_dashboard/CHANGELOG.md
          echo "$REST" >> llm_ai_dashboard/CHANGELOG.md

          # Commit and push
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync HA addon version to $VERSION"
          git push
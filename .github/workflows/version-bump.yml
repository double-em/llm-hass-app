name: Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.bump.outputs.bump }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commits since last tag
        id: commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "commits=$(git log --oneline -20 | tr '\n' ' ')" >> $GITHUB_OUTPUT
            echo "No previous tag found, using last 20 commits"
          else
            echo "Last tag: $LAST_TAG"
            echo "commits=$(git log $LAST_TAG..HEAD --oneline | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi
          echo "Commits output: ${{ steps.commits.outputs.commits }}"

      - name: Determine bump type
        id: bump
        run: |
          COMMITS="${{ steps.commits.outputs.commits }}"
          if echo "$COMMITS" | grep -qE 'feat!\:|fix!\:'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE 'feat:'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE 'fix:'; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
          fi

      - name: Calculate next version
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          # Strip leading v if present
          LAST_NUM=$(echo "$LAST_TAG" | sed 's/^v//')
          # Validate we have valid semver parts
          if ! echo "$LAST_NUM" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Invalid tag format '$LAST_TAG' -> '$LAST_NUM'"
            exit 1
          fi
          MAJOR=$(echo "$LAST_NUM" | cut -d. -f1)
          MINOR=$(echo "$LAST_NUM" | cut -d. -f2)
          PATCH=$(echo "$LAST_NUM" | cut -d. -f3)

          case "${{ steps.bump.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Creating tag: $NEW_VERSION"

  create-tag:
    needs: determine-version
    runs-on: ubuntu-latest
    if: needs.determine-version.outputs.new_version != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version tag
        run: |
          git tag ${{ needs.determine-version.outputs.new_version }}
          git push origin ${{ needs.determine-version.outputs.new_version }}